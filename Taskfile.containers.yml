version: "3"

vars:
  BUILDER: podman

tasks:
  default:
    desc: "Build all services"
    deps:
      - task: _base-node
        vars: { BUILDER: "{{.BUILDER}}" }
    cmds:
      - task: _build_services_parallel
        vars:
          BUILDER: "{{.BUILDER}}"

  _build_services_parallel:
    internal: true
    deps: 
      - task: frontend
        vars: 
          BUILDER: "{{.BUILDER}}"
      - task: api
        vars:
          BUILDER: "{{.BUILDER}}"
      - task: background-processor
        vars:
          BUILDER: "{{.BUILDER}}"

  _build:
    internal: true
    vars:
      DOCKERFILE: '{{default "Dockerfile" .DOCKERFILE}}'
      CONTEXT: '{{default .ROOT_DIR .CONTEXT}}'
    cmds:
      - >-
        {{.BUILDER}} build 
        -f {{.DOCKERFILE}}
        -t {{.NAME}}:latest
        {{.EXTRA_FLAGS}}
        {{.CONTEXT}}

  _base-node:
    internal: true
    cmds:
      - task: _build
        vars:
          NAME: base
          DOCKERFILE: base/node/Dockerfile
          EXTRA_FLAGS: "--secret id=env,src=.env"
          BUILDER: "{{.BUILDER}}"

  frontend:
    desc: "Build Frontend"
    cmds:
      - task: _build
        vars: 
          NAME: pathofexile.accountant.localhost/frontend
          DOCKERFILE: projects/frontend/Dockerfile
          BUILDER: "{{.BUILDER}}"

  api:
    desc: "Build API"
    cmds:
      - task: _build
        vars: 
          NAME: pathofexile.accountant.localhost/api
          DOCKERFILE: projects/api/Dockerfile
          BUILDER: "{{.BUILDER}}"

  background-processor:
    desc: "Build Background Processor"
    cmds:
      - task: _build
        vars: 
          NAME: pathofexile.accountant.localhost/background-processor
          DOCKERFILE: projects/background-processor/Dockerfile
          BUILDER: "{{.BUILDER}}"
