version: '3'

includes:
  base:
    taskfile: ../../base/node/Taskfile.yml
    dir: ./project

tasks:
  start:
    desc: Start the API server in development mode
    dir: .
    cmds:
      - task: base:start

  deploy:
    silent: true
    desc: Deploy the API worker to Cloudflare
    dir: ./project
    vars:
      TF_DIR: ../../../terraform
      HYPERDRIVE_ID:
        sh: cd {{.TF_DIR}} && tofu output -raw api_hyperdrive_id
      FRONTEND_DOMAIN:
        sh: cd {{.TF_DIR}} && tofu output -raw frontend_domain
      VALKEY_URI:
        sh: cd {{.TF_DIR}} && tofu output -raw valkey_uri
      VALKEY_PASSWORD:
        sh: cd {{.TF_DIR}} && tofu output -raw valkey_password
      POSTGRES_URL:
        sh: cd {{.TF_DIR}} && tofu output -raw postgres_url
      R2_BUCKET_NAME:
        sh: cd {{.TF_DIR}} && tofu output -raw r2_bucket_name
      R2_ACCESS_KEY_ID:
        sh: cd {{.TF_DIR}} && tofu output -raw r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        sh: cd {{.TF_DIR}} && tofu output -raw r2_secret_access_key
      API_DOMAIN:
        sh: cd {{.TF_DIR}} && tofu output -raw api_domain_name

      VALKEY_URL: '{{.VALKEY_URI | replace "rediss://" "redis://"}}'
      S3_ENDPOINT: "https://{{.CLOUDFLARE_ACCOUNT_ID}}.r2.cloudflarestorage.com"
      
    cmds:
      # Generate wrangler.prod.toml
      - echo 'routes = [{ pattern = "{{.API_DOMAIN}}", custom_domain = true }]' > wrangler.prod.toml
      - sed 's/id = "local"/id = "{{.HYPERDRIVE_ID}}"/' wrangler.toml >> wrangler.prod.toml
      
      # Deploy (First deploy cleans up conflicting vars)
      - >
        pnpm wrangler deploy --config wrangler.prod.toml
        --var VALKEY_URL:{{.VALKEY_URL}}
        --var CORS_ORIGIN:https://{{.FRONTEND_DOMAIN}}
        --var FRONTEND_URL:https://{{.FRONTEND_DOMAIN}}
        --var PATHOFEXILE_CLIENT_ID:$PATHOFEXILE_CLIENT_ID
        --var PATHOFEXILE_REDIRECT_URL:$PATHOFEXILE_REDIRECT_URL
        --var S3_ENDPOINT:{{.S3_ENDPOINT}}
        --var S3_BUCKET_NAME:{{.R2_BUCKET_NAME}}
        --var S3_FORCE_PATH_STYLE:false

      # Set Secrets (Bulk upload to minimize downtime)
      - |
        cat <<EOF > secrets.json
        {
          "DATABASE_URL": "{{.POSTGRES_URL}}",
          "VALKEY_TOKEN": "{{.VALKEY_PASSWORD}}",
          "PATHOFEXILE_CLIENT_SECRET": "$PATHOFEXILE_CLIENT_SECRET",
          "S3_ACCESS_KEY_ID": "{{.R2_ACCESS_KEY_ID}}",
          "S3_SECRET_ACCESS_KEY": "{{.R2_SECRET_ACCESS_KEY}}"
        }
        EOF
      - pnpm wrangler secret bulk secrets.json -c wrangler.prod.toml
      
      # Cleanup
      - rm wrangler.prod.toml secrets.json
