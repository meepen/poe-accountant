name: poe-accountant

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LOCAL_POSTGRES_DB}
    ports:
      - "${LOCAL_POSTGRES_PORT}:5432"
    volumes:
      - poe-accountant-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:${VALKEY_VERSION}
    container_name: valkey
    ports:
      - "${LOCAL_VALKEY_PORT}:6379"
    command: valkey-server --requirepass "${LOCAL_VALKEY_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    
  valkey-proxy:
    image: hiett/serverless-redis-http:latest
    container_name: valkey-proxy
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${LOCAL_VALKEY_PASSWORD}
      SRH_CONNECTION_STRING: redis://:${LOCAL_VALKEY_PASSWORD}@valkey:${LOCAL_VALKEY_PORT}
      SRH_PORT: 80
    ports:
      - "8079:80"
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: poe-accountant/api:latest
    container_name: api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@postgres:${LOCAL_POSTGRES_PORT}/${LOCAL_POSTGRES_DB}
      VALKEY_URL: redis://:${LOCAL_VALKEY_PASSWORD}@valkey:${LOCAL_VALKEY_PORT}
      VALKEY_TOKEN: ${LOCAL_VALKEY_PASSWORD}
    restart: unless-stopped

  ggg-processor:
    image: poe-accountant/ggg-processor:latest
    container_name: ggg-processor
    environment:
      DATABASE_URL: postgres://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@postgres:${LOCAL_POSTGRES_PORT}/${LOCAL_POSTGRES_DB}
      VALKEY_URL: redis://:${LOCAL_VALKEY_PASSWORD}@valkey:${LOCAL_VALKEY_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: poe-accountant/frontend:latest
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped


networks:
  default:
    name: ${LOCAL_DOCKER_NETWORK}

volumes:
  poe-accountant-postgres-data:
