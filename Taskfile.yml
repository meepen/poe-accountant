version: "3"

dotenv: [".env.local", ".env"]

vars:
  BUILDER:
    sh: |
      if podman info > /dev/null 2>&1; then
        echo "podman"
      else
        echo "docker"
      fi

includes:
  tf:
    taskfile: ./terraform/Taskfile.yml
    dir: ./terraform
    
  api:
    taskfile: ./projects/api/Taskfile.yml
    dir: ./projects/api
  frontend:
    taskfile: ./projects/frontend/Taskfile.yml
    dir: ./projects/frontend
  common:
    taskfile: ./projects/common/Taskfile.yml
    dir: ./projects/common
  background:
    taskfile: ./projects/background-processor/Taskfile.yml
    dir: ./projects/background-processor

  containers:
    taskfile: ./Taskfile.containers.yml
    dir: ./

tasks:
  install:
    cmds:
      - pnpm install

  start:
    cmds:
      - "{{.BUILDER}} compose -f compose.yml up -d"
  
  stop:
    cmds:
      - "{{.BUILDER}} compose -f compose.yml down"

  restart:
    cmds:
      - task: docker:build
      - task: start

  test:
    cmds:
      - pnpm -r test

  lint:
    cmds:
      - pnpm -r lint

  build:
    deps: [install]
    cmds:
      - pnpm -r build

  docker:build: 
    desc: "Build all container images"
    cmds:
      - task: containers:default
        vars:
          BUILDER: "{{.BUILDER}}"

  docker:push:
    desc: "Auth, Build, and Push all artifacts to DigitalOcean"
    vars:
      CI: true
      REGISTRY:
        sh: cd terraform && tofu output -raw registry_endpoint
    cmds:
      - doctl auth init -t {{.TF_VAR_do_token}}
      - doctl registry login
      - "{{if eq .BUILDER \"podman\"}}mkdir -p \"$HOME/.config/containers\" && podman login registry.digitalocean.com -u doctl -p {{.TF_VAR_do_token}} --authfile \"$HOME/.config/containers/auth.json\"{{end}}"
      - task: docker:build
      - |
          {{if eq .BUILDER "podman"}}PODMAN_AUTHFILE="$HOME/.config/containers/auth.json";{{end}}
          {{.BUILDER}} tag pathofexile.accountant.localhost/frontend:latest {{.REGISTRY}}/frontend:latest &&
          {{.BUILDER}} push {{if eq .BUILDER "podman"}}--authfile "$PODMAN_AUTHFILE" {{end}}{{.REGISTRY}}/frontend:latest
      - |
          {{if eq .BUILDER "podman"}}PODMAN_AUTHFILE="$HOME/.config/containers/auth.json";{{end}}
          {{.BUILDER}} tag pathofexile.accountant.localhost/api:latest {{.REGISTRY}}/api:latest &&
          {{.BUILDER}} push {{if eq .BUILDER "podman"}}--authfile "$PODMAN_AUTHFILE" {{end}}{{.REGISTRY}}/api:latest
      - |
          {{if eq .BUILDER "podman"}}PODMAN_AUTHFILE="$HOME/.config/containers/auth.json";{{end}}
          {{.BUILDER}} tag pathofexile.accountant.localhost/background-processor:latest {{.REGISTRY}}/background-processor:latest &&
          {{.BUILDER}} push {{if eq .BUILDER "podman"}}--authfile "$PODMAN_AUTHFILE" {{end}}{{.REGISTRY}}/background-processor:latest
      - echo "Pushing external images"
      - "{{.BUILDER}} pull docker.io/hiett/serverless-redis-http:latest"
      - "{{.BUILDER}} tag docker.io/hiett/serverless-redis-http:latest {{.REGISTRY}}/valkey-proxy:latest"
      - "{{if eq .BUILDER \"podman\"}}PODMAN_AUTHFILE=\"$HOME/.config/containers/auth.json\"; {{end}}{{.BUILDER}} push {{if eq .BUILDER \"podman\"}}--authfile \"$PODMAN_AUTHFILE\" {{end}}{{.REGISTRY}}/valkey-proxy:latest"

  setup:
    cmds:
      - cp .env.example .env
      - task: install
      - task: build

  migrations:generate:
    desc: Generate a new migration file based on local schema changes
    env:
      NODE_OPTIONS: "--import tsx"
    cmds:
      - pnpm --filter=@meepen/poe-accountant-db-schema run build
      - pnpm --filter=@meepen/poe-accountant-db-schema exec drizzle-kit generate

  migrations:apply:
    desc: Apply all pending migrations to the database
    env:
      DB_CONN: "{{.URL}}"
      NODE_OPTIONS: "--import tsx"
    cmds:
      - DATABASE_URL=${DB_CONN:-$DATABASE_URL} pnpm --filter=@meepen/poe-accountant-db-schema exec drizzle-kit migrate

  migrations:apply:remote:
    desc: Apply all pending migrations to the remote database
    vars:
      DATABASE_URL:
        sh: cd terraform && tofu output -raw postgres_url
    env:
      NODE_OPTIONS: "--import tsx"
    cmds:
      - task: migrations:apply
        vars:
          URL: "{{.DATABASE_URL}}"

  deploy:
    desc: Deploy infrastructure and applications
    silent: true
    cmds:
      - task: tf:apply:auto
